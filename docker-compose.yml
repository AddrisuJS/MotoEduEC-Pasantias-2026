version: '3.9'

services:

  # ─── PostgreSQL 16 ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: motoeduc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./E1-ER/create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./E2-BD/seed_marcas.sql:/docker-entrypoint-initdb.d/02_seed_marcas.sql
      - ./E2-BD/seed_motocicletas.sql:/docker-entrypoint-initdb.d/03_seed_motocicletas.sql
      - ./E2-BD/seed_llantas.sql:/docker-entrypoint-initdb.d/04_seed_llantas.sql
      - ./E2-BD/seed_equipamiento.sql:/docker-entrypoint-initdb.d/05_seed_equipamiento.sql
      - ./E2-BD/seed_perfiles.sql:/docker-entrypoint-initdb.d/06_seed_perfiles.sql
      - ./E2-BD/seed_brechas.sql:/docker-entrypoint-initdb.d/07_seed_brechas.sql
    networks:
      - motoeduc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── pgAdmin 4 ────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: motoeduc_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - motoeduc_net

  # ─── FastAPI ──────────────────────────────────────────────────
  api:
    build:
      context: ./E3-API
      dockerfile: Dockerfile
    container_name: motoeduc_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      CHROMADB_HOST: chromadb
      CHROMADB_PORT: 8001
    ports:
      - "8000:8000"
    volumes:
      - ./E3-API:/app
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - motoeduc_net

  # ─── ChromaDB ─────────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    container_name: motoeduc_chromadb
    restart: unless-stopped
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/chroma/chroma
    networks:
      - motoeduc_net

volumes:
  postgres_data:
  chromadb_data:

networks:
  motoeduc_net:
    driver: bridge
